<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo to PDF Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
padding:20px;
}

.preview img{
width:120px;
margin:10px;
border-radius:8px;
}

button{
padding:10px 20px;
margin-top:20px;
font-size:16px;
cursor:pointer;
}

iframe{
width:100%;
height:500px;
margin-top:20px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<h2>Photo to PDF Converter</h2>

<input type="file" id="imageUpload" multiple accept="image/*">

<div class="preview" id="preview"></div>

<button id="createPDF">Create PDF</button>

<br>

<a id="downloadPDF" style="display:none;">Download PDF</a>

<iframe id="pdfPreview"></iframe>

<script>

const input = document.getElementById("imageUpload")
const preview = document.getElementById("preview")
const createBtn = document.getElementById("createPDF")
const downloadBtn = document.getElementById("downloadPDF")
const pdfPreview = document.getElementById("pdfPreview")

let images = []

input.addEventListener("change", function(){

preview.innerHTML=""
images=[]

const files = input.files

for(let i=0;i<files.length;i++){

const reader = new FileReader()

reader.onload=function(e){

images.push(e.target.result)

const img=document.createElement("img")
img.src=e.target.result

preview.appendChild(img)

}

reader.readAsDataURL(files[i])

}

})

createBtn.addEventListener("click", function(){

if(images.length===0){
alert("Upload images first")
return
}

const { jsPDF } = window.jspdf

const pdf = new jsPDF()

images.forEach((img,index)=>{

if(index>0) pdf.addPage()

pdf.addImage(img,"JPEG",10,10,190,0)

})

const blob = pdf.output("blob")

const url = URL.createObjectURL(blob)

pdfPreview.src=url

downloadBtn.href=url
downloadBtn.download="photo-to-pdf.pdf"
downloadBtn.style.display="inline-block"
downloadBtn.innerText="Download PDF"

})

</script>

</body>
</html>
