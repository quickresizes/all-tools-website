<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Professional YouTube Thumbnail Downloader</title>
    <meta
      name="description"
      content="Download YouTube thumbnails instantly in multiple quality options with a clean, responsive dark interface."
    />
    <style>
      :root {
        --bg: #0f1117;
        --panel: #171a23;
        --panel-2: #202532;
        --text: #eef2ff;
        --muted: #9ca6c4;
        --accent: #5b8cff;
        --accent-hover: #79a0ff;
        --error: #ff5e6c;
        --border: #2a3042;
        --shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #1a1f2c 0%, var(--bg) 55%);
        color: var(--text);
      }

      .wrapper {
        width: min(1100px, 92vw);
        margin: 2.5rem auto;
        background: color-mix(in srgb, var(--panel), black 4%);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: clamp(1rem, 3vw, 2rem);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 3vw, 2.15rem);
      }

      .subtitle {
        margin: 0.65rem 0 1.4rem;
        color: var(--muted);
        line-height: 1.5;
      }

      .input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.75rem;
      }

      input[type='url'] {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        border-radius: 12px;
        font-size: 1rem;
        padding: 0.9rem 1rem;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input[type='url']:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(91, 140, 255, 0.18);
      }

      button {
        border: 0;
        border-radius: 12px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        font-size: 0.97rem;
        padding: 0.9rem 1.15rem;
        cursor: pointer;
        transition: transform 0.14s ease, background 0.2s ease;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button:active {
        transform: translateY(1px);
      }

      .error {
        margin-top: 0.8rem;
        color: var(--error);
        min-height: 1.25rem;
        font-size: 0.95rem;
      }

      .grid {
        margin-top: 1.4rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }

      .card {
        background: linear-gradient(170deg, #1b2030 0%, #161a24 90%);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .thumb-wrap {
        aspect-ratio: 16 / 9;
        background: #0f1219;
      }

      .thumb-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .card-body {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.8rem;
        gap: 0.5rem;
      }

      .quality {
        font-size: 0.9rem;
        color: #d5def8;
        font-weight: 600;
      }

      .download {
        text-decoration: none;
        display: inline-block;
        background: #2b62ff;
        color: white;
        border-radius: 10px;
        padding: 0.45rem 0.75rem;
        font-size: 0.88rem;
        font-weight: 600;
      }

      .download:hover {
        background: #4a79ff;
      }

      .empty {
        margin-top: 1rem;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 620px) {
        .input-row {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrapper">
      <h1>Professional YouTube Thumbnail Downloader</h1>
      <p class="subtitle">
        Paste a YouTube link and instantly preview/download thumbnail images in multiple quality options.
      </p>

      <div class="input-row">
        <input
          id="youtubeUrl"
          type="url"
          placeholder="https://www.youtube.com/watch?v=... or https://youtu.be/..."
          aria-label="YouTube URL"
        />
        <button id="loadBtn" type="button">Get Thumbnails</button>
      </div>

      <div id="error" class="error" role="alert" aria-live="polite"></div>
      <div id="result" class="grid" aria-live="polite"></div>
      <p id="emptyHint" class="empty">Supported URLs: youtube.com/watch?v=, youtu.be/, youtube.com/shorts/</p>
    </main>

    <script>
      const urlInput = document.getElementById('youtubeUrl');
      const loadBtn = document.getElementById('loadBtn');
      const errorBox = document.getElementById('error');
      const resultBox = document.getElementById('result');
      const emptyHint = document.getElementById('emptyHint');

      const THUMBNAIL_QUALITIES = [
        { key: 'maxresdefault', label: 'Max Resolution (1280x720)' },
        { key: 'hqdefault', label: 'High Quality (480x360)' },
        { key: 'mqdefault', label: 'Medium Quality (320x180)' },
        { key: 'default', label: 'Default (120x90)' }
      ];

      function extractVideoId(input) {
        if (!input) return null;

        let parsed;
        try {
          parsed = new URL(input.trim());
        } catch {
          return null;
        }

        const host = parsed.hostname.replace('www.', '').toLowerCase();

        if (host === 'youtu.be') {
          const id = parsed.pathname.split('/').filter(Boolean)[0];
          return isValidVideoId(id) ? id : null;
        }

        if (host === 'youtube.com' || host === 'm.youtube.com') {
          if (parsed.pathname === '/watch') {
            const id = parsed.searchParams.get('v');
            return isValidVideoId(id) ? id : null;
          }

          if (parsed.pathname.startsWith('/shorts/')) {
            const id = parsed.pathname.split('/').filter(Boolean)[1];
            return isValidVideoId(id) ? id : null;
          }
        }

        return null;
      }

      function isValidVideoId(id) {
        return typeof id === 'string' && /^[a-zA-Z0-9_-]{11}$/.test(id);
      }

      function renderThumbnails(videoId) {
        resultBox.innerHTML = '';

        THUMBNAIL_QUALITIES.forEach((item) => {
          const imageUrl = `https://img.youtube.com/vi/${videoId}/${item.key}.jpg`;

          const card = document.createElement('article');
          card.className = 'card';

          card.innerHTML = `
            <div class="thumb-wrap">
              <img src="${imageUrl}" alt="${item.label} thumbnail preview" loading="lazy" />
            </div>
            <div class="card-body">
              <span class="quality">${item.label}</span>
              <a class="download" href="${imageUrl}" download="${videoId}-${item.key}.jpg" target="_blank" rel="noopener">Download</a>
            </div>
          `;

          resultBox.appendChild(card);
        });
      }

      function handleLoad() {
        const videoId = extractVideoId(urlInput.value);

        if (!videoId) {
          resultBox.innerHTML = '';
          errorBox.textContent =
            'Invalid YouTube URL. Please use a valid watch, short, or youtu.be link.';
          return;
        }

        errorBox.textContent = '';
        emptyHint.textContent = `Video ID detected: ${videoId}`;
        renderThumbnails(videoId);
      }

      loadBtn.addEventListener('click', handleLoad);
      urlInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          handleLoad();
        }
      });
    </script>
  </body>
</html>
