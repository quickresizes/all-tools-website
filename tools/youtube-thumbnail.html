<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Thumbnail Downloader – Free Online Tool | MediaTools Pro</title>
    <meta
      name="description"
      content="Paste a YouTube video URL and instantly preview and download all available thumbnail sizes. 100% client-side and free."
    />
    <meta
      name="keywords"
      content="youtube thumbnail downloader, download youtube thumbnail, maxresdefault, hqdefault, mqdefault"
    />
    <meta property="og:title" content="YouTube Thumbnail Downloader – Free Online Tool | MediaTools Pro" />
    <meta
      property="og:description"
      content="Extract and download YouTube thumbnails in all common quality sizes with one click."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mediatoolspro.com/tools/youtube-thumbnail.html" />
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body data-base-path="../">
    <header id="site-header"></header>

    <main class="page-main tool-container container">
      <section class="tool-panel tool-header">
        <h1>YouTube Thumbnail Downloader</h1>
        <p class="meta-text">
          Paste a YouTube video URL to instantly preview and download available thumbnail sizes.
        </p>
      </section>

      <section class="tool-panel tool-content">
        <h2>Get Thumbnail</h2>
        <p class="meta-text">Everything works in your browser. No uploads, no server processing.</p>

        <div class="yt-thumb-controls">
          <label for="youtube-url-input">YouTube video URL</label>
          <input
            id="youtube-url-input"
            class="text-input"
            type="url"
            placeholder="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
            autocomplete="off"
          />
          <button id="youtube-thumbnail-button" class="btn" type="button">Get Thumbnail</button>
        </div>

        <p id="youtube-thumbnail-message" class="meta-text" aria-live="polite">
          Enter a valid YouTube URL to view thumbnail options.
        </p>

        <div id="youtube-thumbnail-results" class="yt-thumb-grid" aria-live="polite"></div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <script src="../js/layout.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
