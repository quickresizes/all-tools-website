<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator – Free Online QR Creator | MediaTools Pro</title>
    <meta
      name="description"
      content="Generate fully customizable QR codes for URLs, text, contact cards, WiFi, phone, email, SMS, and location in your browser with full privacy."
    />
    <meta
      name="keywords"
      content="qr code generator, qr with logo, qr download png svg jpg, wifi qr, vcard qr"
    />
    <meta property="og:title" content="QR Code Generator – Free Online QR Creator | MediaTools Pro" />
    <meta
      property="og:description"
      content="Create and customize QR codes instantly in your browser. Download PNG, SVG, or JPG with no backend required."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mediatoolspro.com/tools/qr-code-generator.html" />
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .qr-layout { display:grid; grid-template-columns:minmax(0, 1.05fr) minmax(0, .95fr); gap:1rem; }
      .qr-card {
        background: var(--panel, #fff);
        border: 1px solid var(--line, #dbe4f0);
        border-radius: 14px;
        padding: 1rem;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      }
      .qr-card h2 { margin: 0 0 .9rem; font-size: 1.18rem; }
      .group { margin-bottom: .8rem; }
      .group label {
        display:block;
        margin-bottom: .35rem;
        font-size: .9rem;
        font-weight: 600;
        color: #1f2937;
      }
      .group input, .group select, .group textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: .62rem .72rem;
        font-size: .93rem;
        background: #fff;
      }
      .group textarea { min-height: 88px; resize: vertical; }
      .field-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:.65rem; }
      .toolbar, .download-row, .share-row { display:flex; flex-wrap:wrap; gap:.55rem; }
      .btn-primary, .btn-secondary {
        border-radius: 10px;
        font-weight: 600;
        border: 1px solid transparent;
        cursor: pointer;
        padding: .64rem .9rem;
      }
      .btn-primary { background: linear-gradient(135deg, #2563eb, #7c3aed); color: #fff; }
      .btn-secondary { background:#fff; border-color:#cbd5e1; color:#0f172a; }
      .toggle-row { display:flex; align-items:center; gap:.5rem; margin:.5rem 0 .75rem; }
      .toggle-row label { margin:0; font-weight:500; }
      .preview-shell {
        border: 2px dashed #cbd5e1;
        border-radius: 14px;
        background: #f8fafc;
        min-height: 360px;
        display:flex;
        align-items:center;
        justify-content:center;
        padding: 1rem;
      }
      #qrPreview { min-width: 250px; min-height: 250px; display:flex; align-items:center; justify-content:center; }
      .status { margin:.7rem 0 0; color:#475569; font-size:.88rem; }
      .history-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(122px, 1fr)); gap:.65rem; margin-top:.6rem; }
      .history-item { border:1px solid #dbe4f0; border-radius:10px; padding:.45rem; background:#fff; }
      .history-item img { width:100%; aspect-ratio:1/1; object-fit:contain; background:#f8fafc; border-radius:8px; }
      .history-item button { width:100%; margin-top:.4rem; border:1px solid #cbd5e1; border-radius:8px; background:#fff; padding:.35rem .4rem; font-size:.78rem; cursor:pointer; }
      .help { font-size:.84rem; color:#64748b; margin:.3rem 0 0; }
      @media (max-width: 980px) { .qr-layout { grid-template-columns:1fr; } }
      @media (max-width: 640px) { .field-grid { grid-template-columns:1fr; } }
      @media (prefers-color-scheme: dark) {
        .qr-card { background:#0f172a; border-color:#334155; }
        .group label { color:#e2e8f0; }
        .group input, .group select, .group textarea { background:#111827; border-color:#334155; color:#e2e8f0; }
        .btn-secondary, .history-item button { background:#111827; border-color:#334155; color:#e2e8f0; }
        .history-item { background:#0f172a; border-color:#334155; }
        .preview-shell { background:#020617; border-color:#334155; }
        .status, .help { color:#94a3b8; }
      }
    </style>
  </head>
  <body data-base-path="../">
    <header id="site-header"></header>

    <main class="page-main tool-container container">
      <section class="tool-panel tool-header">
        <h1>QR Code Generator Tool</h1>
        <p class="meta-text">Everything runs locally in your browser. No QR data is sent to any server.</p>
      </section>

      <section class="tool-panel tool-content">
        <div class="qr-layout">
          <article class="qr-card">
            <h2>Input & Customization</h2>

            <div class="group">
              <label for="qrType">QR Input Type</label>
              <select id="qrType">
                <option value="url">Website URL</option>
                <option value="text">Plain Text</option>
                <option value="email">Email</option>
                <option value="phone">Phone Number</option>
                <option value="sms">SMS Message</option>
                <option value="vcard">Contact Card (vCard)</option>
                <option value="wifi">WiFi Network</option>
                <option value="location">Location (Google Maps link)</option>
              </select>
            </div>

            <div id="dynamicFields"></div>

            <div class="field-grid">
              <div class="group">
                <label for="dotColor">QR Color</label>
                <input id="dotColor" type="color" value="#111111" />
              </div>
              <div class="group">
                <label for="bgColor">Background Color</label>
                <input id="bgColor" type="color" value="#ffffff" />
              </div>
              <div class="group">
                <label for="qrStyle">QR Style</label>
                <select id="qrStyle">
                  <option value="square">Square style</option>
                  <option value="rounded">Rounded dots</option>
                  <option value="dots">Circular dots</option>
                  <option value="modern">Modern style</option>
                </select>
              </div>
              <div class="group">
                <label for="qrSize">Size</label>
                <select id="qrSize">
                  <option value="256">256px</option>
                  <option value="512" selected>512px</option>
                  <option value="1024">1024px</option>
                </select>
              </div>
              <div class="group">
                <label for="qrEcc">Error Correction Level</label>
                <select id="qrEcc">
                  <option value="L">Low</option>
                  <option value="M" selected>Medium</option>
                  <option value="Q">Quartile</option>
                  <option value="H">High</option>
                </select>
              </div>
              <div class="group">
                <label for="logoUpload">Center Logo (optional)</label>
                <input id="logoUpload" type="file" accept="image/*" />
              </div>
            </div>

            <div class="toggle-row">
              <input id="transparentBg" type="checkbox" />
              <label for="transparentBg">Transparent background</label>
            </div>

            <div class="toolbar">
              <button class="btn-primary" id="generateBtn" type="button">Generate QR Code</button>
              <button class="btn-secondary" id="copyBtn" type="button">Copy QR Image</button>
            </div>
            <p class="help">Privacy: generation, logo merge, preview, and history are all local-only browser actions.</p>
          </article>

          <article class="qr-card">
            <h2>Live Preview</h2>
            <div class="preview-shell">
              <div id="qrPreview" aria-live="polite"></div>
            </div>
            <p class="status" id="statusText">Ready to generate.</p>

            <h3>Download</h3>
            <div class="download-row">
              <button class="btn-secondary" type="button" data-download="png">Download PNG</button>
              <button class="btn-secondary" type="button" data-download="svg">Download SVG</button>
              <button class="btn-secondary" type="button" data-download="jpeg">Download JPG</button>
            </div>

            <h3>Share</h3>
            <div class="share-row">
              <button class="btn-secondary" type="button" data-share="whatsapp">WhatsApp</button>
              <button class="btn-secondary" type="button" data-share="twitter">Twitter</button>
              <button class="btn-secondary" type="button" data-share="facebook">Facebook</button>
            </div>

            <h3>Recent History (last 5)</h3>
            <div id="historyGrid" class="history-grid"></div>
          </article>
        </div>
      </section>
    </main>

    <footer id="site-footer"></footer>

    <script src="https://unpkg.com/qr-code-styling@1.8.0/lib/qr-code-styling.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/main.js"></script>
    <script>
      const $ = (id) => document.getElementById(id);
      const qrType = $("qrType");
      const dynamicFields = $("dynamicFields");
      const statusText = $("statusText");
      const historyKey = "qr_tool_history_v2";
      let qrCode;
      let currentPayload = "";
      let logoDataUrl = "";

      const templates = {
        url: `
          <div class="group">
            <label for="fieldUrl">Website URL</label>
            <input id="fieldUrl" type="url" placeholder="https://example.com" />
          </div>`,
        text: `
          <div class="group">
            <label for="fieldText">Plain Text</label>
            <textarea id="fieldText" placeholder="Enter any text"></textarea>
          </div>`,
        email: `
          <div class="field-grid">
            <div class="group"><label for="fieldEmail">Email Address</label><input id="fieldEmail" type="email" placeholder="you@example.com" /></div>
            <div class="group"><label for="fieldEmailSubject">Subject</label><input id="fieldEmailSubject" type="text" placeholder="Subject" /></div>
          </div>
          <div class="group"><label for="fieldEmailBody">Message</label><textarea id="fieldEmailBody" placeholder="Email body"></textarea></div>`,
        phone: `
          <div class="group">
            <label for="fieldPhone">Phone Number</label>
            <input id="fieldPhone" type="tel" placeholder="+12025550123" />
          </div>`,
        sms: `
          <div class="field-grid">
            <div class="group"><label for="fieldSmsNumber">Phone Number</label><input id="fieldSmsNumber" type="tel" placeholder="+12025550123" /></div>
            <div class="group"><label for="fieldSmsMessage">Message</label><input id="fieldSmsMessage" type="text" placeholder="Hello" /></div>
          </div>`,
        vcard: `
          <div class="field-grid">
            <div class="group"><label for="vcName">Name</label><input id="vcName" placeholder="Alex Johnson" /></div>
            <div class="group"><label for="vcPhone">Phone</label><input id="vcPhone" placeholder="+12025550123" /></div>
            <div class="group"><label for="vcEmail">Email</label><input id="vcEmail" type="email" placeholder="alex@example.com" /></div>
            <div class="group"><label for="vcWebsite">Website</label><input id="vcWebsite" type="url" placeholder="https://example.com" /></div>
          </div>
          <div class="group"><label for="vcAddress">Address</label><textarea id="vcAddress" placeholder="Street, City, Country"></textarea></div>`,
        wifi: `
          <div class="field-grid">
            <div class="group"><label for="wifiSsid">Network Name (SSID)</label><input id="wifiSsid" placeholder="My WiFi" /></div>
            <div class="group"><label for="wifiPassword">Password</label><input id="wifiPassword" type="text" placeholder="wifi-password" /></div>
            <div class="group"><label for="wifiEncryption">Encryption Type</label><select id="wifiEncryption"><option value="WPA">WPA</option><option value="WPA2">WPA/WPA2</option><option value="nopass">Open</option></select></div>
          </div>`,
        location: `
          <div class="group">
            <label for="locationQuery">Location (Google Maps)</label>
            <input id="locationQuery" placeholder="Eiffel Tower, Paris" />
          </div>`
      };

      function renderFields() {
        dynamicFields.innerHTML = templates[qrType.value] || templates.text;
      }

      const getVal = (id) => ($(id)?.value || "").trim();
      const esc = (value) => value.replace(/([;,:\\"])/g, "\\$1");

      function buildPayload() {
        const type = qrType.value;
        if (type === "url") return getVal("fieldUrl");
        if (type === "text") return getVal("fieldText");
        if (type === "email") return `mailto:${getVal("fieldEmail")}?subject=${encodeURIComponent(getVal("fieldEmailSubject"))}&body=${encodeURIComponent(getVal("fieldEmailBody"))}`;
        if (type === "phone") return `tel:${getVal("fieldPhone")}`;
        if (type === "sms") return `SMSTO:${getVal("fieldSmsNumber")}:${getVal("fieldSmsMessage")}`;
        if (type === "vcard") {
          return [
            "BEGIN:VCARD",
            "VERSION:3.0",
            `FN:${getVal("vcName")}`,
            getVal("vcPhone") ? `TEL:${getVal("vcPhone")}` : "",
            getVal("vcEmail") ? `EMAIL:${getVal("vcEmail")}` : "",
            getVal("vcWebsite") ? `URL:${getVal("vcWebsite")}` : "",
            getVal("vcAddress") ? `ADR:;;${getVal("vcAddress").replace(/\n/g, " ")};;;;` : "",
            "END:VCARD"
          ].filter(Boolean).join("\n");
        }
        if (type === "wifi") {
          return `WIFI:T:${getVal("wifiEncryption")};S:${esc(getVal("wifiSsid"))};P:${esc(getVal("wifiPassword"))};;`;
        }
        if (type === "location") return `https://maps.google.com/?q=${encodeURIComponent(getVal("locationQuery"))}`;
        return "";
      }

      function styleOptions(style) {
        if (style === "rounded") return { dots: "rounded", cornersSquare: "extra-rounded", cornersDot: "dot" };
        if (style === "dots") return { dots: "dots", cornersSquare: "dot", cornersDot: "dot" };
        if (style === "modern") return { dots: "classy-rounded", cornersSquare: "classy", cornersDot: "square" };
        return { dots: "square", cornersSquare: "square", cornersDot: "square" };
      }

      function buildOptions(payload) {
        const size = Number($("qrSize").value);
        const bgTransparent = $("transparentBg").checked;
        const style = styleOptions($("qrStyle").value);
        return {
          width: size,
          height: size,
          data: payload,
          margin: 8,
          qrOptions: { errorCorrectionLevel: $("qrEcc").value },
          image: logoDataUrl || undefined,
          imageOptions: { crossOrigin: "anonymous", margin: 4, imageSize: 0.22 },
          dotsOptions: { color: $("dotColor").value, type: style.dots },
          cornersSquareOptions: { color: $("dotColor").value, type: style.cornersSquare },
          cornersDotOptions: { color: $("dotColor").value, type: style.cornersDot },
          backgroundOptions: { color: bgTransparent ? "rgba(0,0,0,0)" : $("bgColor").value }
        };
      }

      function historyGet() {
        try { return JSON.parse(localStorage.getItem(historyKey) || "[]"); }
        catch { return []; }
      }

      function historySet(items) {
        localStorage.setItem(historyKey, JSON.stringify(items.slice(0, 5)));
      }

      function renderHistory() {
        const items = historyGet();
        const historyGrid = $("historyGrid");
        if (!items.length) {
          historyGrid.innerHTML = '<p class="help">No recent QR codes yet.</p>';
          return;
        }
        historyGrid.innerHTML = items.map((item, i) => `
          <article class="history-item">
            <img src="${item.preview}" alt="History QR ${i + 1}" loading="lazy" />
            <button type="button" data-history="${i}">Use</button>
          </article>`).join("");
      }

      async function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error("Unable to read image file."));
          reader.readAsDataURL(blob);
        });
      }

      async function saveToHistory(payload, options, type) {
        const pngBlob = await qrCode.getRawData("png");
        const preview = await blobToDataUrl(pngBlob);
        const items = [{ payload, options, type, preview, time: Date.now() }, ...historyGet()];
        historySet(items);
        renderHistory();
      }

      async function generateCode() {
        const payload = buildPayload();
        if (!payload) {
          statusText.textContent = "Please fill in the selected input type fields.";
          return;
        }

        currentPayload = payload;
        const options = buildOptions(payload);

        if (!qrCode) {
          qrCode = new QRCodeStyling(options);
          $("qrPreview").innerHTML = "";
          qrCode.append($("qrPreview"));
        } else {
          qrCode.update(options);
        }

        await saveToHistory(payload, options, qrType.value);
        statusText.textContent = "QR generated instantly in your browser.";
      }

      function shareCurrent(platform) {
        if (!currentPayload) return;
        const encodedPayload = encodeURIComponent(currentPayload);
        const text = encodeURIComponent(`QR content: ${currentPayload}`);
        const urls = {
          whatsapp: `https://wa.me/?text=${text}`,
          twitter: `https://twitter.com/intent/tweet?text=${text}`,
          facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodedPayload}`
        };
        window.open(urls[platform], "_blank", "noopener,noreferrer");
      }

      qrType.addEventListener("change", () => {
        renderFields();
        statusText.textContent = "Input fields updated.";
      });

      $("generateBtn").addEventListener("click", generateCode);

      $("logoUpload").addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        logoDataUrl = await blobToDataUrl(file);
        statusText.textContent = "Logo uploaded. Generate again to apply it.";
      });

      $("copyBtn").addEventListener("click", async () => {
        if (!qrCode || !navigator.clipboard || typeof ClipboardItem === "undefined") {
          statusText.textContent = "Clipboard image copy is unavailable in this browser.";
          return;
        }
        try {
          const blob = await qrCode.getRawData("png");
          await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
          statusText.textContent = "QR image copied to clipboard.";
        } catch {
          statusText.textContent = "Unable to copy image. Try downloading instead.";
        }
      });

      document.querySelectorAll("[data-download]").forEach((button) => {
        button.addEventListener("click", async () => {
          if (!qrCode) {
            statusText.textContent = "Generate a QR code first.";
            return;
          }
          const format = button.dataset.download;
          await qrCode.download({ name: `qr-${Date.now()}`, extension: format });
        });
      });

      document.querySelectorAll("[data-share]").forEach((button) => {
        button.addEventListener("click", () => shareCurrent(button.dataset.share));
      });

      $("historyGrid").addEventListener("click", (event) => {
        const btn = event.target.closest("button[data-history]");
        if (!btn) return;
        const item = historyGet()[Number(btn.dataset.history)];
        if (!item) return;
        currentPayload = item.payload;
        if (!qrCode) {
          qrCode = new QRCodeStyling(item.options);
          $("qrPreview").innerHTML = "";
          qrCode.append($("qrPreview"));
        } else {
          qrCode.update(item.options);
        }
        statusText.textContent = "Loaded QR code from local history.";
      });

      renderFields();
      renderHistory();
    </script>
  </body>
</html>
